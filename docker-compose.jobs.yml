# Private Fotocorp jobs processor (Node + Sharp). No published ports.
# Copy apps/jobs/.env.production.example → apps/jobs/.env.production on the VPS.
#
# Production:
#   fotocorp-jobs-wake — long-lived HTTP trigger (no Neon polling); Cloudflare Tunnel → 127.0.0.1:18765
#   fotocorp-jobs — one-shot drain (cron / manual): docker compose … run --rm fotocorp-jobs
#
# Dev-only continuous poller (profile):
#   docker compose -f docker-compose.jobs.yml --profile dev-worker up -d fotocorp-jobs-worker
#
# Build after code changes (repo root):
#   docker compose -f docker-compose.jobs.yml --env-file apps/jobs/.env.production build fotocorp-jobs
# See docs/db-revamp/media-pipeline-operations.md (VPS jobs section)

services:
  fotocorp-jobs:
    build:
      context: .
      dockerfile: apps/jobs/Dockerfile
    image: fotocorp-jobs:latest
    container_name: fotocorp-jobs
    restart: "no"
    command: ["pnpm", "--dir", "apps/jobs", "run", "publish:drain"]
    env_file:
      - apps/jobs/.env.production
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NODE_ENV: production
      MALLOC_ARENA_MAX: "2"
      UV_THREADPOOL_SIZE: "2"
      PUBLISH_DRAIN_MAX_JOBS: "25"
      PUBLISH_DRAIN_MAX_RUNTIME_SECONDS: "300"
      # PR-16G: set IMAGE_PUBLISH_PROCESSING_ENABLED=true on the VPS when Neon + R2 env is complete.
      IMAGE_PUBLISH_PROCESSING_ENABLED: ${IMAGE_PUBLISH_PROCESSING_ENABLED:-false}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  fotocorp-jobs-wake:
    build:
      context: .
      dockerfile: apps/jobs/Dockerfile
    image: fotocorp-jobs:latest
    container_name: fotocorp-jobs-wake
    restart: unless-stopped
    command: ["pnpm", "--dir", "apps/jobs", "run", "publish:wake"]
    env_file:
      - apps/jobs/.env.production
    ports:
      - "127.0.0.1:${JOBS_WAKE_PORT:-18765}:18765"
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NODE_ENV: production
      JOBS_WAKE_BIND_HOST: "0.0.0.0"
      JOBS_WAKE_PORT: "18765"
      MALLOC_ARENA_MAX: "2"
      UV_THREADPOOL_SIZE: "2"
      PUBLISH_DRAIN_MAX_JOBS: "25"
      PUBLISH_DRAIN_MAX_RUNTIME_SECONDS: "300"
      IMAGE_PUBLISH_PROCESSING_ENABLED: ${IMAGE_PUBLISH_PROCESSING_ENABLED:-false}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  fotocorp-jobs-worker:
    profiles: ["dev-worker"]
    build:
      context: .
      dockerfile: apps/jobs/Dockerfile
    image: fotocorp-jobs:latest
    container_name: fotocorp-jobs-worker
    restart: unless-stopped
    command: ["pnpm", "--dir", "apps/jobs", "run", "publish:worker"]
    env_file:
      - apps/jobs/.env.production
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NODE_ENV: production
      ALLOW_CONTINUOUS_JOB_WORKER: "true"
      MALLOC_ARENA_MAX: "2"
      UV_THREADPOOL_SIZE: "2"
      IMAGE_PUBLISH_WORKER_CONCURRENCY: "1"
      IMAGE_PUBLISH_POLL_INTERVAL_MS: "15000"
      IMAGE_PUBLISH_PROCESSING_ENABLED: ${IMAGE_PUBLISH_PROCESSING_ENABLED:-false}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
